<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Everson Araujo | Fotógrafo</title>

<meta name="description" content="Everson Araujo, fotógrafo especializado em retratos corporativos, fashion, marca pessoal e campanhas publicitárias." />

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme: {
extend: {
colors: {
base: '#000000',
soft: '#0a0a0a',
panel: '#111111'
},
boxShadow: {
softxl: '0 20px 60px rgba(0,0,0,.45)'
}
}
}
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

html{
scroll-behavior:smooth;
}

body{
font-family:Inter,sans-serif;
background:#000;
color:white;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.galeria img{
width:100%;
height:420px;
object-fit:cover;
border-radius:16px;
cursor:pointer;
transition:all .4s ease;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

.galeria img:hover{
transform:scale(1.04);
box-shadow:0 20px 60px rgba(0,0,0,.7);
}

#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
align-items:center;
justify-content:center;
z-index:999;
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:12px;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.85)),url("media/hero.jpg");
background-size:cover;
background-position:center;
}

.btn{
background:white;
color:black;
padding:15px 30px;
border-radius:40px;
font-weight:600;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 15px 40px rgba(255,255,255,.2);
}

</style>

</head>

<body>

<section class="hero">

<div>

<h1 class="text-6xl font-bold mb-6">
Everson Araujo
</h1>

<p class="text-xl mb-8">
Fotógrafo | Retratos Corporativos & Fashion
</p>

<a href="#corporativo" class="btn">
Ver Ensaios
</a>

</div>

</section>

<section id="corporativo" class="py-24">

<div class="max-w-7xl mx-auto px-6">

<h2 class="text-5xl mb-10 text-center">
Ensaio Corporativo
</h2>

<div class="galeria">

<img src="media/primeira.jpg" onclick="abrirImagem(this)">
<img src="media/segunda.jpg" onclick="abrirImagem(this)">
<img src="media/terceira.jpg" onclick="abrirImagem(this)">
<img src="media/quarta.jpg" onclick="abrirImagem(this)">
<img src="media/quinta.jpg" onclick="abrirImagem(this)">
<img src="media/sexta.jpg" onclick="abrirImagem(this)">

</div>

</div>

</section>

<section class="py-24 text-center">

<h2 class="text-5xl mb-8">
Agende seu ensaio
</h2>

<a href="https://wa.me/559184218754" class="btn">
Falar no WhatsApp
</a>

</section>

<div id="lightbox" onclick="fecharImagem()">
<img id="lightbox-img">
</div>

<script>

function abrirImagem(img){

document.getElementById("lightbox").style.display="flex"
document.getElementById("lightbox-img").src=img.src

}

function fecharImagem(){

document.getElementById("lightbox").style.display="none"

}

</script>

</body>
</html>
